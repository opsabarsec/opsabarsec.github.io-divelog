<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Divelog</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <!-- Login Overlay -->
  <div id="login-overlay" class="login-overlay">
    <div class="login-card">
      <h2>Divelog</h2>
      <p>Enter password to continue</p>
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <input type="password" id="password-input" placeholder="Password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
      </form>
    </div>
  </div>

  <!-- Main App -->
  <div id="main-app" style="display: none;">

    <!-- Header -->
    <header class="header">
      <div class="header-content">
        <div class="logo-area">
          <div class="logo">Dive<span>Log</span></div>
          <span id="user-name" style="color: var(--text-secondary); font-size: 0.95rem;"></span>
        </div>
        <nav class="nav">
          <button class="nav-btn active" data-view="home">Home</button>
          <button class="nav-btn" data-view="dives">My Dives</button>
          <button class="nav-btn" data-view="certifications">Certifications</button>
        </nav>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      <div class="app-container">

        <!-- Home View -->
        <div id="home-view" class="view active">
          <div class="profile-section">
            <img id="profile-photo" class="profile-photo" src="" alt="Profile" style="display: none;">
            <div class="profile-info">
              <div id="profile-name" class="profile-name">Diver</div>
              <div class="dive-stats">
                <span id="total-dives">0 dives</span>
              </div>
            </div>
          </div>
          <h2 class="section-title">Latest Dive</h2>
          <div id="latest-dive-container">
            <div class="loading">Loading latest dive...</div>
          </div>
        </div>

        <!-- Dives View -->
        <div id="dives-view" class="view">
          <h2 class="section-title">My Dives</h2>
          <div id="dives-list" class="dives-grid"></div>
        </div>

        <!-- Certifications View -->
        <div id="certifications-view" class="view">
          <h2 class="section-title">Certifications</h2>
          <div id="certifications-list" class="certifications-grid"></div>
        </div>

      </div>
    </main>

  </div>

  <!-- Confirm Delete Modal -->
  <div id="confirm-modal" class="modal">
    <div class="modal-content modal-small">
      <div class="modal-header">
        <h3>Confirm Delete</h3>
        <button class="close-btn" onclick="closeConfirmModal()">&times;</button>
      </div>
      <div style="padding: 25px;">
        <p id="confirm-message" style="color: var(--text-secondary); margin-bottom: 25px;"></p>
        <div class="form-actions">
          <button class="btn btn-secondary" onclick="closeConfirmModal()">Cancel</button>
          <button id="confirm-delete-btn" class="btn btn-danger">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
